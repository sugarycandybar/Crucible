app-id: io.github.sugarycandybar.Crucible
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: crucible
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=/sys:ro
modules:
  - python3-requirements.json
  - name: stress-ng
    buildsystem: simple
    build-commands:
      - make -j$FLATPAK_BUILDER_N_JOBS
      - install -Dm755 stress-ng /app/bin/stress-ng
    sources:
      - type: archive
        url: https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.00.tar.gz
        sha256: 1339cbc6ccbff7e2ee2177bf0fd67e7b94e8ff7b07fe89bcfaec0280d800cf34
  - name: crucible
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/sugarycandybar/Crucible.git
        commit: 1618680409e1d4849c655eb8b31d7f34afbd26eb