app-id: io.github.sugarycandybar.Crucible
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: crucible
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=/sys:ro
modules:
  - python3-requirements.json
  - name: stress-ng
    buildsystem: simple
    build-commands:
      - make -j$(nproc)
      - install -Dm755 stress-ng /app/bin/stress-ng
    sources:
      - type: archive
        url: https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.00.tar.gz
        sha256: 1339cbc6ccbff7e2ee2177bf0fd67e7b94e8ff7b07fe89bcfaec0280d800cf34
  - name: crucible
    buildsystem: simple
    build-commands:
      - install -d /app/share
      - cp -a crucible /app/share/
      - install -Dm755 crucible.py /app/share/crucible.py
      - install -Dm755 packaging/flatpak/crucible-wrapper.sh /app/bin/crucible
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Crucible.desktop /app/share/applications/io.github.sugarycandybar.Crucible.desktop
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Crucible.metainfo.xml /app/share/metainfo/io.github.sugarycandybar.Crucible.metainfo.xml
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Crucible.svg /app/share/icons/hicolor/scalable/apps/io.github.sugarycandybar.Crucible.svg
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Crucible-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.sugarycandybar.Crucible-symbolic.svg
      - install -Dm644 packaging/linux/scalable/apps/processor-symbolic.svg /app/share/icons/hicolor/scalable/apps/processor-symbolic.svg
      - install -Dm644 packaging/linux/scalable/apps/pci-card-symbolic.svg /app/share/icons/hicolor/scalable/apps/pci-card-symbolic.svg
      - install -Dm644 packaging/linux/scalable/apps/memory-symbolic.svg /app/share/icons/hicolor/scalable/apps/memory-symbolic.svg
      - install -Dm644 packaging/linux/scalable/apps/arrow-pointing-at-line-up-symbolic.svg /app/share/icons/hicolor/scalable/apps/arrow-pointing-at-line-up-symbolic.svg
      - install -Dm644 packaging/linux/scalable/apps/stop-sign-large-symbolic.svg /app/share/icons/hicolor/scalable/apps/stop-sign-large-symbolic.svg
      - install -Dm644 packaging/linux/scalable/apps/thermometer-symbolic.svg /app/share/icons/hicolor/scalable/apps/thermometer-symbolic.svg
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Crucible.Stability.gschema.xml /app/share/glib-2.0/schemas/io.github.sugarycandybar.Crucible.Stability.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas/
    sources:
      - type: git
        url: https://github.com/sugarycandybar/Crucible.git
        commit: 18f16caf82727ba1e7eaccf4604c5680ec8367e5