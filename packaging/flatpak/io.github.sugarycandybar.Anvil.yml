app-id: io.github.sugarycandybar.Anvil
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: anvil
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=host:ro
  - --filesystem=/proc:rw
  - --filesystem=/sys:rw
  - --filesystem=/dev/null:rw
  - --filesystem=/dev/urandom:rw
  - --talk-name=org.freedesktop.Notifications
  - --allow=devel
modules:
  - name: psutil
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links=. --prefix=${FLATPAK_DEST} ./psutil*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b5/70/5d8df3b09e25bce090399cf48e452d25c935ab72dad19406c77f4e828045/psutil-7.2.2-cp36-abi3-manylinux2010_x86_64.manylinux_2_12_x86_64.manylinux_2_28_x86_64.whl
        sha256: 076a2d2f923fd4821644f5ba89f059523da90dc9014e85f8e45a5774ca5bc6f9
  - name: stress-ng
    buildsystem: simple
    build-commands:
      - make -j$(nproc)
      - install -Dm755 stress-ng /app/bin/stress-ng
    sources:
      - type: archive
        url: https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.00.tar.gz
        sha256: 1339cbc6ccbff7e2ee2177bf0fd67e7b94e8ff7b07fe89bcfaec0280d800cf34
  - name: anvil
    buildsystem: simple
    build-commands:
      - install -d /app/share
      - cp -a anvil /app/share/
      - install -Dm755 anvil.py /app/share/anvil.py
      - install -Dm755 packaging/flatpak/anvil-wrapper.sh /app/bin/anvil
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Anvil.desktop /app/share/applications/io.github.sugarycandybar.Anvil.desktop
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Anvil.metainfo.xml /app/share/metainfo/io.github.sugarycandybar.Anvil.metainfo.xml
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Anvil.svg /app/share/icons/hicolor/scalable/apps/io.github.sugarycandybar.Anvil.svg
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Anvil-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.sugarycandybar.Anvil-symbolic.svg
    sources:
      - type: git
        url: https://github.com/sugarycandybar/Anvil.git
        commit: 1b3acd96bc42277e53a12272d3c3a990981694ef
