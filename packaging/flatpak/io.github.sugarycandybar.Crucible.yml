app-id: io.github.sugarycandybar.Crucible
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: crucible
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=/sys:ro
modules:
  - name: stress-ng
    buildsystem: simple
    build-commands:
      - make -j$FLATPAK_BUILDER_N_JOBS
      - install -Dm755 stress-ng /app/bin/stress-ng
    sources:
      - type: archive
        url: https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.00.tar.gz
        sha256: 1339cbc6ccbff7e2ee2177bf0fd67e7b94e8ff7b07fe89bcfaec0280d800cf34
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ColinIanKing/stress-ng/releases/latest
          tag-query: .tag_name
          version-query: .tag_name | ltrimstr("V")
          timestamp-query: .published_at
  - name: crucible
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/crucible/cargo
    build-commands:
      - . /usr/lib/sdk/rust-stable/enable.sh && cargo --offline build --release
      - install -Dm755 target/release/crucible /app/bin/crucible
      - install -Dm644 data/io.github.sugarycandybar.Crucible.desktop /app/share/applications/io.github.sugarycandybar.Crucible.desktop
      - install -Dm644 data/io.github.sugarycandybar.Crucible.metainfo.xml /app/share/metainfo/io.github.sugarycandybar.Crucible.metainfo.xml
      - install -Dm644 data/io.github.sugarycandybar.Crucible.svg /app/share/icons/hicolor/scalable/apps/io.github.sugarycandybar.Crucible.svg
      - install -Dm644 data/io.github.sugarycandybar.Crucible-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.sugarycandybar.Crucible-symbolic.svg
      - install -Dm644 data/io.github.sugarycandybar.Hosty.svg /app/share/icons/hicolor/scalable/apps/io.github.sugarycandybar.Hosty.svg
      - install -Dm644 data/io.github.sugarycandybar.Crucible.Stability.gschema.xml /app/share/glib-2.0/schemas/io.github.sugarycandybar.Crucible.Stability.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas/
    sources:
      - type: dir
        path: ../../
      - generated-sources.json
